apiVersion: apps/v1
kind: Deployment
metadata: { name: backend, namespace: kg-rag }
spec:
  replicas: 3
  selector: { matchLabels: { app: backend } }
  template:
    metadata: { labels: { app: backend } }
    spec:
      containers:
      - name: backend
        image: ghcr.io/your-org/kg-rag-backend:0.1.0
        ports: [{ containerPort: 8000 }]
        envFrom:
        - secretRef: { name: kg-rag-secrets }
        - configMapRef: { name: kg-rag-config }
        readinessProbe:
          httpGet: { path: /healthz, port: 8000 }
          initialDelaySeconds: 5
        resources:
          requests: { cpu: "500m", memory: "1Gi" }
          limits: { cpu: "2", memory: "4Gi" }
---
apiVersion: v1
kind: Service
metadata: { name: backend, namespace: kg-rag }
spec:
  selector: { app: backend }
  ports: [{ port: 80, targetPort: 8000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: backend-hpa, namespace: kg-rag }
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
  - type: Pods
    pods:
      metric: { name: http_inflight_requests }
      target: { type: AverageValue, averageValue: "25" }
