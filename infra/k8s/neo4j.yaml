apiVersion: apps/v1
kind: StatefulSet
metadata: { name: neo4j, namespace: kg-rag }
spec:
  serviceName: neo4j
  replicas: 1          # prod: 3-node Causal Cluster
  selector: { matchLabels: { app: neo4j } }
  template:
    metadata: { labels: { app: neo4j } }
    spec:
      containers:
      - name: neo4j
        image: neo4j:5.20-enterprise
        env:
        - { name: NEO4J_ACCEPT_LICENSE_AGREEMENT, value: "yes" }
        - { name: NEO4J_AUTH, valueFrom: { secretKeyRef: { name: kg-rag-secrets, key: NEO4J_AUTH }}}
        - { name: NEO4J_PLUGINS, value: '["graph-data-science","apoc"]' }
        - { name: NEO4J_dbms_memory_heap_max__size, value: "8G" }
        - { name: NEO4J_dbms_memory_pagecache_size, value: "4G" }
        ports: [{ containerPort: 7687 }, { containerPort: 7474 }]
        volumeMounts: [{ name: data, mountPath: /data }]
        resources:
          requests: { cpu: "2", memory: "16Gi" }
          limits: { cpu: "4", memory: "32Gi" }
  volumeClaimTemplates:
  - metadata: { name: data }
    spec:
      accessModes: ["ReadWriteOnce"]
      resources: { requests: { storage: 200Gi } }
      storageClassName: fast-ssd
---
apiVersion: v1
kind: Service
metadata: { name: neo4j, namespace: kg-rag }
spec:
  selector: { app: neo4j }
  ports:
  - { name: bolt, port: 7687 }
  - { name: http, port: 7474 }
